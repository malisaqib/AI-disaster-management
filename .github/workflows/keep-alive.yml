name: Keep Render backend awake

# Render's free tier spins the service down after ~15 min of inactivity, which
# causes a slow cold start (~50s) on the next visit. This workflow pings the
# health endpoint every 10 minutes to keep it warm during the day.
#
# Note: keeping the service always-on consumes Render's free 750 instance-hours
# /month (~enough for one always-on service). If you add other free services,
# you may want to disable this. You can also disable it from the Actions tab.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --max-time 90 --retry 3 --retry-delay 20 \
            https://ai-disaster-management-gtrj.onrender.com/health \
            && echo "Backend is awake"
